name: Deploy on Push

on:
  push:
    branches: [main]
    paths:
      - 'data/promotions/**'
      - 'scripts/**'
      - 'public/**'
      - 'locales/**'
      - 'app/**'
      - 'components/**'
      - 'i18n/**'
      - 'lib/**'
      - 'middleware.ts'
      - 'next.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      - '.github/workflows/deploy-on-push.yml'
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-deploy:
    name: Validate · Build · FTP Upload
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write   # 允許 commit active.json / archive.json 回 repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Upgrade npm (match local lockfile generator)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Validate promotions schedule
        run: npm run validate:promotions

      - name: Build active.json / archive.json
        run: npm run build:active

      - name: Lint
        run: npm run lint

      - name: Build Next.js (static export)
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL || 'https://www.auvita.tw' }}
        run: npm run build

      - name: Verify out/ exists
        run: |
          test -d out || (echo "::error::out/ not generated"; exit 1)
          echo "out/ size: $(du -sh out | cut -f1)"

      - name: Upload to auvita.tw via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_HOST }}
          port: ${{ secrets.FTP_PORT || 21 }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          local-dir: ./out/
          server-dir: ${{ secrets.FTP_REMOTE_PATH || '/' }}
          log-level: minimal
          retries: 1
          # 增量同步：靠遠端 .ftp-deploy-sync-state.json 追蹤差異（首次 clean-slate 已完成）。

      - name: Commit auto-generated active/archive (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/promotions/active.json data/promotions/archive.json
          if git diff --cached --quiet; then
            echo "No auto-generated changes to commit"
          else
            git commit -m "chore(promotions): auto-build active/archive [skip ci]"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
